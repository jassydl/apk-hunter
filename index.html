<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Hunter - Systembolaget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-bold flex items-center gap-3">
                <span class="text-amber-400">🍺</span> APK Hunter
            </h1>
            <p class="text-zinc-400">Bästa värdet på Systembolaget</p>
        </header>

        <div class="bg-zinc-900 p-6 rounded-3xl mb-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm mb-2 text-zinc-400">Kategori</label>
                <select id="category" onchange="filterData()" class="w-full bg-zinc-800 rounded-2xl px-4 py-3">
                    <option value="">Alla</option>
                    <option value="Öl">🍺 Öl</option>
                    <option value="Vin">🍷 Vin</option>
                    <option value="Sprit">🥃 Sprit</option>
                </select>
            </div>
            <div>
                <label class="block text-sm mb-2 text-zinc-400">Sök</label>
                <input id="searchInput" type="text" placeholder="Namn eller artikelnummer..." 
                       onkeyup="filterData()" 
                       class="w-full bg-zinc-800 rounded-2xl px-4 py-3">
            </div>
            <div class="flex items-end">
                <button onclick="refreshData()" 
                        class="w-full bg-amber-400 hover:bg-amber-500 text-zinc-950 font-semibold py-3 rounded-2xl flex items-center justify-center gap-2">
                    <i class="fas fa-sync"></i> Uppdatera
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-amber-400"></i>
        </div>

        <div class="bg-zinc-900 rounded-3xl overflow-hidden">
            <table class="w-full">
                <thead class="bg-zinc-800">
                    <tr>
                        <th class="p-5 text-left">Produkt</th>
                        <th class="p-5 text-left">Kategori</th>
                        <th class="p-5 text-center">Art.nr</th>
                        <th class="p-5 text-right">Alk %</th>
                        <th
